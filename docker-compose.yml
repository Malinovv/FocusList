services:
  postgres:
    image: postgres:16-alpine
    container_name: focuslist-postgres
    environment:
      POSTGRES_DB: focuslist
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - focuslist_postgres_data:/var/lib/postgresql/data

volumes:
  focuslist_postgres_data:
